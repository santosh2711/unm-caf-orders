

<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="theme-color" content="#f97316" />
	<script type="module">
		let applyTranslations = () => {};
		try {
			const mod = await import('./i18n.js');
			applyTranslations = mod.applyTranslations || applyTranslations;
		} catch (err) {
			try {
				const repoBase = window.location.pathname.split('/')[1] || '';
				if (repoBase) {
					const altUrl = `${window.location.origin}/${repoBase}/i18n.js`;
					const mod = await import(altUrl);
					applyTranslations = mod.applyTranslations || applyTranslations;
				}
			} catch (fallbackErr) {
				console.warn('i18n failed to load; continuing without translations', fallbackErr);
			}
		}
		applyTranslations();
	</script>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
	<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='6' y='6' width='52' height='52' rx='12' ry='12' fill='%23fff' stroke='%23f97316' stroke-width='2'/%3E%3Cpath fill='%23f97316' d='M18 14c4.2 0 7.6 3.4 7.6 7.6 0 3.2-1.8 6-4.6 7.1V46h-6V28.7c-2.8-1.1-4.6-3.9-4.6-7.1C10.4 17.4 13.8 14 18 14z'/%3E%3Cpath fill='%23ea580c' d='M34 14h4v10h2V14h4v10h2V14h4v12h-6v20h-6V26h-6z'/%3E%3C/svg%3E" />
	<title>Menu</title>
	<style>
		:root {
			--orange: #f97316;
			--orange-dark: #ea580c;
			--black: #0f172a;
			--gray: #f8fafc;
			--border: #e2e8f0;
			--top-cream: #f8f2e6;
			--top-cream-border: #e9d7b1;
			--top-gold: #d8b468;
			--top-gold-deep: #c8a352;
			--top-blue-start: #1d4ed8;
			--top-blue-mid: #1e40af;
			--top-blue-end: #1d4ed8;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: 'Nunito', 'Inter', 'Segoe UI', sans-serif;
			background: #ffffff;
			color: var(--black);
			padding-top: 76px;
		}

		body.modal-open {
			overflow: hidden;
		}

		header {
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			height: 76px;
			background:
				radial-gradient(900px 140px at 16% -50%, rgba(255,255,255,0.18), transparent 60%),
				linear-gradient(135deg, var(--top-blue-start) 0%, var(--top-blue-mid) 56%, var(--top-blue-end) 100%);
			border-bottom: 1px solid rgba(59,130,246,0.55);
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 0 16px;
			z-index: 100;
			box-shadow: 0 10px 24px rgba(29, 78, 216, 0.42);
			overflow: hidden;
		}

		header::before {
			content: '';
			position: absolute;
			inset: 0;
			pointer-events: none;
			background-image:
				radial-gradient(rgba(255,255,255,0.42) 1px, transparent 1px),
				radial-gradient(rgba(255,255,255,0.3) 0.9px, transparent 0.9px),
				radial-gradient(rgba(255,255,255,0.22) 0.8px, transparent 0.8px);
			background-size: 28px 28px, 36px 36px, 46px 46px;
			background-position: 0 0, 12px 10px, 20px 16px;
			opacity: 0.58;
		}

		header > * {
			position: relative;
			z-index: 1;
		}

		.header-left {
			display: inline-flex;
			align-items: center;
			gap: 10px;
			flex: 1;
			min-width: 0;
		}

		.brand {
			display: inline-flex;
			align-items: center;
			gap: 10px;
			font-size: 20px;
			font-weight: 700;
			letter-spacing: 0.5px;
			color: #ffd08a;
			white-space: normal;
			flex: 1;
			min-width: 0;
			overflow: hidden;
		}

		#brand-name {
			overflow-wrap: anywhere;
			line-height: 1.2;
		}

		.brand-logo {
			width: 38px;
			height: 38px;
			border-radius: 12px;
			object-fit: cover;
			border: 1px solid var(--border);
			background: var(--gray);
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
			flex-shrink: 0;
		}

		.header-right {
			display: flex;
			align-items: center;
			gap: 14px;
			font-size: 14px;
			color: #eaf2ff;
			flex-shrink: 0;
		}

		.pill {
			background: var(--gray);
			border: 1px solid var(--border);
			border-radius: 999px;
			padding: 6px 12px;
			display: inline-flex;
			align-items: center;
			gap: 8px;
			font-weight: 600;
		}

		.profile-btn {
			cursor: pointer;
		}

		.back-btn {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			gap: 7px;
			padding: 8px 13px;
			border-radius: 12px;
			border: 1px solid rgba(216,180,104,0.5);
			background: linear-gradient(145deg, #fff9ed, #f8ecd5);
			color: #7a431a;
			font-weight: 800;
			letter-spacing: 0.2px;
			cursor: pointer;
			box-shadow: 0 6px 16px rgba(122, 67, 26, 0.16);
			transition: background 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
		}

		.back-btn:hover {
			background: linear-gradient(145deg, #fffaf2, #f6e6c5);
			box-shadow: 0 8px 18px rgba(122, 67, 26, 0.2);
		}
		.back-btn:active { transform: translateY(1px); }
		.back-btn span[aria-hidden="true"] {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 20px;
			height: 20px;
			border-radius: 999px;
			background: rgba(216,180,104,0.22);
			font-size: 14px;
			font-weight: 900;
			line-height: 1;
		}
		.back-label { transform: translateY(-0.2px); }

		.profile-circle {
			width: 28px;
			height: 28px;
			border-radius: 50%;
			background: var(--orange);
			color: #fff;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			font-weight: 800;
			font-size: 13px;
		}

		.profile-name {
			display: none;
		}

		.profile-dropdown {
			position: absolute;
			top: 70px;
			right: 16px;
			background: #ffffff;
			border: 1px solid var(--border);
			border-radius: 12px;
			box-shadow: 0 10px 30px rgba(0,0,0,0.12);
			padding: 10px 12px;
			min-width: 200px;
			display: none;
			z-index: 220;
		}

		.profile-dropdown.active { display: block; }

		.profile-email { color: #475569; font-size: 13px; margin: 4px 0 10px; }

		.dropdown-link {
			width: 100%;
			border: 1px solid var(--border);
			border-radius: 10px;
			padding: 10px 12px;
			background: #ffffff;
			color: var(--black);
			font-weight: 700;
			cursor: pointer;
			margin-bottom: 8px;
			text-align: left;
		}

		.logout-btn {
			width: 100%;
			border: 1px solid var(--border);
			border-radius: 10px;
			padding: 10px 12px;
			background: #fff7ed;
			color: var(--orange-dark);
			font-weight: 800;
			cursor: pointer;
		}

		main {
			max-width: 960px;
			margin: 0 auto;
			padding: 16px;
		}

		.category-nav {
			position: sticky;
			top: 128px;
			z-index: 120;
			background: #ffffff;
			padding: 8px 0 6px;
			margin: 0 -16px 8px;
		.item-card.unavailable {
			opacity: 0.35;
			filter: blur(2.5px);
		}
		.item-card.unavailable .add-btn {
			background: #e2e8f0;
			color: #94a3b8;
			cursor: not-allowed;
		}
		.unavailable-badge {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			padding: 6px 10px;
			border-radius: 10px;
			background: #fee2e2;
			color: #991b1b;
			font-weight: 800;
			font-size: 12px;
		}
			overflow-x: auto;
			border-bottom: 1px solid var(--border);
		}

		.category-nav-inner {
			display: inline-flex;
			gap: 8px;
			padding: 0 16px;
			white-space: nowrap;
		}

		.sub-nav {
			display: none;
			gap: 8px;
			padding: 6px 0 8px;
			margin: 0 -16px 10px;
			overflow-x: auto;
			border-bottom: 1px solid var(--border);
			background: #ffffff;
		}

		.sub-nav-inner {
			display: inline-flex;
			gap: 8px;
			padding: 0 16px;
			white-space: nowrap;
		}

		.view-categories {
			display: none;
			padding: 8px 12px;
			border: 1px solid var(--border);
			background: #fff7ed;
			color: var(--orange-dark);
			border-radius: 10px;
			font-weight: 800;
			cursor: pointer;
			margin: 4px 0 8px;
		}

		.search-bar {
			position: sticky;
			top: 76px;
			z-index: 115;
			background: #ffffff;
			padding: 8px 0;
			margin: 0 0 12px;
			display: flex;
			flex-wrap: wrap;
			gap: 10px;
			align-items: center;
		}

		.search-input {
			flex: 1;
			padding: 10px 12px;
			border: 1px solid var(--border);
			border-radius: 10px;
			font-size: 14px;
		}

		.category-pill-btn {
			border: 1px solid var(--border);
			background: #ffffff;
			color: var(--black);
			padding: 8px 12px;
			border-radius: 999px;
			font-weight: 700;
			cursor: pointer;
			transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
		}

		.category-pill-btn.active {
			background: #fff7ed;
			border-color: var(--orange);
			color: var(--orange-dark);
		}

		.loading {
			display: none;
			align-items: center;
			justify-content: center;
			gap: 10px;
			color: var(--black);
			font-weight: 600;
			padding: 32px 0;
		}

		.cart-pill-bar {
			position: fixed;
			left: 50%;
			bottom: 18px;
			transform: translateX(-50%);
			width: min(520px, calc(100% - 24px));
			display: none;
			align-items: center;
			justify-content: center;
			gap: 10px;
			padding: 14px 18px;
			border-radius: 999px;
			background: linear-gradient(135deg, var(--top-blue-start) 0%, var(--top-blue-mid) 56%, var(--top-blue-end) 100%);
			color: #ffffff;
			border: none;
			font-weight: 800;
			font-size: 15px;
			font-family: 'Nunito', 'Segoe UI', Tahoma, sans-serif;
			box-shadow: 0 12px 28px rgba(29, 78, 216, 0.35);
			cursor: pointer;
			z-index: 215;
		}

		.cart-pill-bar:hover {
			background: linear-gradient(135deg, #1e40af 0%, #1d4ed8 100%);
		}

		.cart-pill-bar.pulse {
			animation: pulseCart 0.4s ease;
		}


		.cart-overlay {
			position: fixed;
			inset: 0;
			background: rgba(0, 0, 0, 0.4);
			opacity: 0;
			pointer-events: none;
			transition: opacity 0.25s ease;
			z-index: 190;
		}

		.cart-overlay.active {
			opacity: 1;
			pointer-events: all;
		}

		.cart-drawer {
			position: fixed;
			inset: auto 0 0 0;
			max-height: 70vh;
			background: #ffffff;
			border-radius: 16px 16px 0 0;
			box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.12);
			transform: translateY(100%);
			transition: transform 0.25s ease;
			z-index: 200;
			display: flex;
			flex-direction: column;
			padding-bottom: 110px;
		}

		.cart-drawer.active {
			transform: translateY(0);
		}

		.cart-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 14px 16px;
			border-bottom: 1px solid var(--border);
			font-weight: 700;
		}

		.cart-close {
			background: transparent;
			border: none;
			font-size: 18px;
			cursor: pointer;
			color: var(--black);
		}

		.cart-items {
			overflow-y: auto;
			padding: 8px 16px 4px;
			max-height: 45vh;
		}

		.cart-row {
			display: grid;
			grid-template-columns: 1fr auto;
			gap: 8px;
			padding: 10px 0;
			border-bottom: 1px solid var(--border);
		}

		.cart-row:last-child {
			border-bottom: none;
		}

		.cart-row h4 {
			margin: 0;
			font-size: 15px;
			color: var(--black);
		}

		.cart-meta {
			font-size: 13px;
			color: #475569;
		}

		.cart-note {
			font-size: 12px;
			color: #94a3b8;
			margin-top: 2px;
		}

		.qty-controls {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			background: var(--gray);
			border-radius: 999px;
			padding: 6px 10px;
			border: 1px solid var(--border);
		}

		.qty-btn {
			width: 26px;
			height: 26px;
			border-radius: 50%;
			border: none;
			background: var(--orange);
			color: #ffffff;
			font-weight: 800;
			cursor: pointer;
			line-height: 1;
		}

		.cart-footer {
			padding: 12px 16px 18px;
			border-top: 1px solid var(--border);
			display: flex;
			align-items: center;
			justify-content: space-between;
			font-weight: 700;
		}

		.checkout-btn {
			margin: 12px 16px 18px;
			width: calc(100% - 32px);
			align-self: center;
			padding: 14px 18px;
			background: var(--orange);
			color: #ffffff;
			border: none;
			border-radius: 12px;
			font-weight: 800;
			cursor: pointer;
			transition: background 0.2s ease, transform 0.2s ease;
		}

		.checkout-btn:disabled {
			opacity: 0.6;
			cursor: not-allowed;
			transform: none;
		}

		.checkout-btn:not(:disabled):active {
			transform: scale(0.98);
		}

		.cart-empty {
			padding: 14px 16px;
			text-align: center;
			color: #475569;
			font-weight: 600;
		}

		.loading.active {
			display: flex;
		}

		.spinner {
			width: 20px;
			height: 20px;
			border-radius: 50%;
			border: 3px solid var(--orange);
			border-top-color: transparent;
			animation: spin 0.9s linear infinite;
		}

		.flying-img {
			position: fixed;
			width: 60px;
			height: 60px;
			object-fit: cover;
			border-radius: 10px;
			pointer-events: none;
			z-index: 500;
			transition: transform 0.45s ease, opacity 0.45s ease;
		}

		@keyframes spin {
			to {
				transform: rotate(360deg);
			}
		}

		@keyframes pulseCart {
			0% { transform: scale(1); }
			40% { transform: scale(1.1); }
			100% { transform: scale(1); }
		}

		.category {
			margin-bottom: 28px;
		}

		.category-title {
			font-size: 18px;
			font-weight: 800;
			color: var(--orange-dark);
			margin: 0 0 12px;
			padding: 8px 0;
			border-bottom: 2px solid var(--orange);
		}

		.item-card {
			display: flex;
			gap: 12px;
			align-items: center;
			background: #ffffff;
			border: 1px solid var(--border);
			border-radius: 12px;
			padding: 10px;
			box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
			margin-bottom: 10px;
			touch-action: manipulation;
		}

		.item-image {
			width: 88px;
			height: 88px;
			border-radius: 10px;
			object-fit: cover;
			background: var(--gray);
			flex-shrink: 0;
		}

		.item-info {
			flex: 1;
			display: flex;
			flex-direction: column;
			gap: 6px;
			min-width: 0;
		}

		.item-top {
			display: flex;
			align-items: center;
			gap: 8px;
			flex-wrap: wrap;
		}

		.item-name {
			font-size: 16px;
			font-weight: 700;
			color: var(--black);
			margin: 0;
		}

		.badge {
			display: inline-flex;
			align-items: center;
			gap: 4px;
			padding: 3px 8px;
			border-radius: 999px;
			font-size: 12px;
			font-weight: 700;
			background: rgba(249, 115, 22, 0.14);
			color: var(--orange-dark);
			border: 1px solid rgba(249, 115, 22, 0.25);
		}

		.veg-dot {
			width: 12px;
			height: 12px;
			border-radius: 50%;
			margin-right: 8px;
		}

		.veg {
			background: #22c55e;
		}

		.filter-btn {
			border: none;
			background: transparent;
			padding: 0;
		}

		.switch-btn {
			position: relative;
			display: inline-flex;
			align-items: center;
			gap: 10px;
			padding: 6px 10px;
			border-radius: 14px;
			border: 1px solid var(--border);
			background: #fff;
			font-weight: 800;
			color: var(--black);
			cursor: pointer;
			transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
			min-width: 148px;
		}

		.switch-btn .switch-track {
			position: relative;
			width: 54px;
			height: 28px;
			border-radius: 999px;
			background: #e2e8f0;
			border: 1px solid #cbd5e1;
			transition: background 0.2s ease, border-color 0.2s ease;
			flex-shrink: 0;
		}

		.switch-btn .switch-thumb {
			position: absolute;
			top: 3px;
			left: 3px;
			width: 22px;
			height: 22px;
			border-radius: 50%;
			background: #ffffff;
			box-shadow: 0 2px 6px rgba(0,0,0,0.12);
			transition: transform 0.2s ease, background 0.2s ease;
		}

		.switch-btn .switch-label {
			font-size: 13px;
			color: #334155;
			white-space: nowrap;
		}

		.switch-btn.switch-on {
			border-color: #fb923c;
			background: #fff7ed;
			box-shadow: 0 6px 14px rgba(249, 115, 22, 0.18);
		}

		.switch-btn.switch-on .switch-track {
			background: #fb923c;
			border-color: #f97316;
		}

		.switch-btn.switch-on .switch-thumb {
			transform: translateX(26px);
			background: #fff;
		}

		.item-desc {
			margin: 0;
			font-size: 14px;
			color: #475569;
			line-height: 1.4;
			overflow: hidden;
			text-overflow: ellipsis;
			display: -webkit-box;
			line-clamp: 3;
			-webkit-line-clamp: 3;
			-webkit-box-orient: vertical;
		}

		.item-bottom {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 8px;
		}

		.price {
			font-weight: 800;
			color: var(--black);
			font-size: 15px;
		}

		.add-btn {
			background: var(--orange);
			color: #ffffff;
			border: none;
			padding: 12px 18px;
			border-radius: 10px;
			font-weight: 700;
			cursor: pointer;
			transition: background 0.2s ease, transform 0.2s ease;
			flex-shrink: 0;
			min-width: 88px;
			font-size: 15px;
		}

		.add-btn:active {
			transform: scale(0.98);
		}

		.add-btn:hover {
			background: var(--orange-dark);
		}

		@media (max-width: 767px) {

			.search-input {
				font-size: 13px;
			}

			.switch-btn {
				padding: 6px 8px;
				gap: 8px;
				min-width: 138px;
			}

			.switch-btn .switch-label {
				font-size: 12px;
			}

			.category-pill-btn {
				font-size: 13px;
				padding: 7px 10px;
			}

			.item-name {
				font-size: 15px;
			}

			.price {
				font-size: 14px;
			}

			.item-desc {
				font-size: 13px;
			}

			.badge {
				font-size: 11px;
			}

			header {
				padding: 0 14px;
			}

			.brand {
				font-size: 17px;
				gap: 8px;
			}

			.brand-logo {
				width: 32px;

if (unavailable) card.classList.add("unavailable");

const addBtn = document.createElement("button");
addBtn.className = "add-btn";
addBtn.type = "button";
				addBtn.textContent = unavailable ? "Not available" : previewMode ? "Preview only" : needsCustomization ? "Customize" : "Add";
addBtn.disabled = unavailable || previewMode;
				addBtn.addEventListener("click", (event) => {
event.stopPropagation();
if (unavailable || previewMode) return;
if (needsCustomization) {
	stashCustomizeItem({ ...itemForNote, image: imageSrc, imageURL: imageSrc, vendorId: vendorId || "" });
goToNote(itemForNote, imageSrc);
return;
}
animateToCart(img);
addToCart({
id: item.id,
name: item.name,
price: Number(item.price) || 0,
image: imageSrc,
category: item.category || "",
notes: "",
});
});

bottomRow.appendChild(price);
bottomRow.appendChild(addBtn);

info.appendChild(topRow);
info.appendChild(desc);
info.appendChild(bottomRow);

card.style.cursor = unavailable || previewMode ? "not-allowed" : "pointer";
card.addEventListener("click", () => {
if (unavailable || previewMode) return;
if (needsCustomization) {
	stashCustomizeItem({ ...itemForNote, image: imageSrc, imageURL: imageSrc, vendorId: vendorId || "" });
}
goToNote(itemForNote, imageSrc);
});

card.appendChild(img);
card.appendChild(info);
section.appendChild(card);
});

if (section.querySelector(".item-card")) {
sectionFrag.appendChild(section);
sectionsInfo.push({ id: sectionId, label: catLabel });
}
});

menuContainer.appendChild(sectionFrag);
buildCategoryNav(sectionsInfo);
};

		const setSwitchState = (btn, on, onLabel, offLabel) => {
			if (!btn) return;
			const labelEl = btn.querySelector(".switch-label");
			if (labelEl) labelEl.textContent = on ? onLabel : offLabel;
			btn.classList.toggle("switch-on", on);
			btn.setAttribute("aria-pressed", String(on));
		};

		const applyAvailableToggleState = () => {
			availableOnly = localStorage.getItem(availablePrefKey) === "1";
			setSwitchState(availableToggle, availableOnly, "Available now", "Available now");
		};

		const filteredItems = () => {
			const term = (searchInput.value || "").trim().toLowerCase();
			return allItems.filter((item) => {
				if (!term) return true;
				const name = (item.name || "").toLowerCase();
				const desc = (item.description || "").toLowerCase();
				const cat = (item.category || "").toLowerCase();
				return name.includes(term) || desc.includes(term) || cat.includes(term);
			});
		};

		const startMenuListener = () => {
			if (!vendorId) {
				loadingEl.classList.remove("active");
				searchBar.style.display = "none";
				menuContainer.innerHTML = '<div class="empty">No vendor specified. Please open this menu from a valid shop link.</div>';
				return;
			}
			loadingEl.classList.add("active");
			if (menuUnsub) menuUnsub();
			menuUnsub = onSnapshot(collection(db, "vendors", vendorId, "menus"), (snap) => {
				allItems = snap.docs.map((doc) => ({ id: doc.id, ...doc.data() }));
				applyAvailableToggleState();
				renderMenu(filteredItems());
				searchBar.style.display = "flex";
				loadingEl.classList.remove("active");
			}, (error) => {
				loadingEl.classList.remove("active");
				console.error("Error loading menu", error);
				const message = error?.code === "permission-denied"
					? '<div class="empty">Access denied: Firestore rules are blocking reads. Please allow reads for the menu or sign in with an authorized user.</div>'
					: genericErrorHtml;
				menuContainer.innerHTML = message;
			});
		};

		const handleSearch = () => {
			renderMenu(filteredItems());
		};

		const toggleProfileDropdown = () => {
			if (!profileDropdown) return;
			profileOpen = !profileOpen;
			profileDropdown.classList.toggle("active", profileOpen);
		};

		const closeProfileDropdown = () => {
			if (!profileDropdown) return;
			profileOpen = false;
			profileDropdown.classList.remove("active");
			profileDropdown.style.transform = "";
			profileDropdown.style.transition = "";
		};

		const profileDragHandle = document.getElementById("menu-profile-drag");
		if (profileDragHandle && profileDropdown) {
			let dragStartY = 0;
			let dragDistance = 0;
			profileDragHandle.addEventListener("pointerdown", (event) => {
				dragStartY = event.clientY;
				dragDistance = 0;
				profileDragHandle.setPointerCapture(event.pointerId);
				profileDropdown.style.transition = "none";
			});
			profileDragHandle.addEventListener("pointermove", (event) => {
				if (!profileDragHandle.hasPointerCapture(event.pointerId)) return;
				dragDistance = Math.max(0, event.clientY - dragStartY);
				profileDropdown.style.transform = `translateY(${dragDistance}px)`;
			});
			profileDragHandle.addEventListener("pointerup", (event) => {
				profileDragHandle.releasePointerCapture(event.pointerId);
				profileDropdown.style.transition = "transform .22s ease";
				if (dragDistance > 70) closeProfileDropdown();
				else profileDropdown.style.transform = "";
			});
		}

		logoutBtn?.addEventListener("click", async () => {
			try {
				await signOut(auth);
				window.location.href = "student-login.html";
			} catch (err) {
				console.error("Failed to sign out", err);
			}
		});

		backBtn?.addEventListener("click", handleBack);

		loginBtn?.addEventListener("click", () => {
			window.location.href = "student-login.html";
		});

		homeLink?.addEventListener("click", () => {
			window.location.href = "student-home.html";
		});

		shoplistLink?.addEventListener("click", () => {
			window.location.href = "shop-list.html";
		});

		profileBtn?.addEventListener("click", (event) => {
			event.stopPropagation();
			toggleProfileDropdown();
		});

		document.addEventListener("click", (event) => {
			if (!profileDropdown || !profileBtn) return;
			if (profileOpen && !profileDropdown.contains(event.target) && !profileBtn.contains(event.target)) {
				closeProfileDropdown();
			}
		});

		onAuthStateChanged(auth, (user) => {
			const displayName = user?.displayName || user?.email?.split("@")[0] || guestLabel;
			const email = user?.email || guestEmail;
			profileDisplay.textContent = displayName;
			profileEmail.textContent = email;
			if (profileName) profileName.textContent = displayName;
			const initial = (displayName[0] || "?").toUpperCase();
			profileCircle.textContent = initial;
			if (logoutBtn) logoutBtn.style.display = user ? "block" : "none";
			if (loginBtn) loginBtn.style.display = user ? "none" : "block";
		});

		searchInput.addEventListener("input", handleSearch);

		availableToggle?.addEventListener("click", () => {
			availableOnly = !availableOnly;
			localStorage.setItem(availablePrefKey, availableOnly ? "1" : "0");
			applyAvailableToggleState();
			renderMenu(filteredItems());
		});

		cartPillBar?.addEventListener("click", () => {
			if (cartDrawer.classList.contains("active")) {
				closeCart();
			} else {
				openCart();
			}
		});
		cartOverlay.addEventListener("click", closeCart);
		closeCartBtn.addEventListener("click", closeCart);
		checkoutBtn.addEventListener("click", goToCheckout);

		renderCartDrawer();
		window.addEventListener("pageshow", () => {
			renderCartDrawer();
		});
		applyDarkMode();
		window.addEventListener("storage", (event) => {
			if (event.key === "darkMode") applyDarkMode();
		});
		loadVendorDetails().finally(() => {
			startMenuListener();
		});
	</script>
</body>
</html>
